<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minhas Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
:root{
  --bg:#0d0f0e;--surface:#141714;--surface2:#1a1d1a;--border:#2a2e2a;--border2:#363b36;
  --green:#4ade80;--green-text:#86efac;--red:#f87171;--red-text:#fca5a5;
  --amber:#fbbf24;--amber-text:#fcd34d;--blue:#60a5fa;--blue-text:#93c5fd;
  --purple:#c084fc;--text:#e8ebe8;--text2:#8a9a8a;--text3:#5a6a5a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;line-height:1.5;overflow-x:hidden;}
input,select,button{font-family:inherit;}

.container{max-width:480px;margin:0 auto;padding:20px;min-height:100vh;display:flex;flex-direction:column;}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.logo{font-weight:800; font-size:1.2rem; letter-spacing:-0.04em;}

.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px;}
.month-nav button{background:none;border:none;color:var(--text);cursor:pointer;padding:8px;}
.cur-month{font-size:1.1rem;font-weight:700;min-width:140px;text-align:center;}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.sum-card{background:var(--surface);padding:16px;border-radius:20px;border:1px solid var(--border);}
.sum-label{font-size:0.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.sum-val{font-size:1.1rem;font-weight:700;font-family:'DM Mono',monospace;}
.sum-card.main{grid-column:span 2;background:var(--text);color:var(--bg);border:none;}

.tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:14px;margin-bottom:24px;overflow-x:auto;}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:none;color:var(--text3);font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.2);}

.form-card{background:var(--surface);padding:20px;border-radius:24px;border:1px solid var(--border);margin-bottom:24px;}
.input-group{margin-bottom:16px;}
label{display:block;font-size:0.75rem;color:var(--text3);margin-bottom:6px;font-weight:600;}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border2);padding:12px;border-radius:12px;color:var(--text);font-size:0.9rem;outline:none;}
.btn-add{width:100%;background:var(--green);color:var(--bg);border:none;padding:14px;border-radius:12px;font-weight:800;cursor:pointer;}

.item-card{background:var(--surface);padding:14px;border-radius:16px;border:1px solid var(--border);margin-bottom:10px;font-size:0.9rem;}
.val-in{color:var(--green-text);}
.val-out{color:var(--red-text);}
.hidden{display:none;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 24px;border-radius:100px;font-weight:700;font-size:0.8rem;z-index:2000;opacity:0;pointer-events:none;transition:all 0.3s;}
#toast.show{opacity:1;bottom:40px;}
</style>
</head>
<body>

<div class="container" id="mainApp">
  <header>
    <div class="logo">OTÁVIO.FIN</div>
  </header>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">←</button>
    <div class="cur-month" id="curMonth">Mês / Ano</div>
    <button onclick="changeMonth(1)">→</button>
  </div>

  <div class="summary-grid">
    <div class="sum-card main">
      <div class="sum-label" style="color:rgba(0,0,0,0.5)">Saldo Mensal</div>
      <div class="sum-val" id="sumTotal">R$ 0,00</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Receitas</div>
      <div class="sum-val val-in" id="sumIn">R$ 0,00</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">Despesas</div>
      <div class="sum-val val-out" id="sumOut">R$ 0,00</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="goTab('quick', this)">Lançar</button>
    <button class="tab" onclick="goTab('detail', this)">Extrato</button>
    <button class="tab" onclick="goTab('invest', this)">Investimentos</button>
  </div>

  <div id="tab-quick" class="tab-content">
    <div class="form-card">
      <div class="summary-grid" style="grid-template-columns: 2fr 1fr; gap:8px;">
        <div class="input-group">
          <label>Descrição</label>
          <input type="text" id="qDesc" placeholder="Ex: Mercado">
        </div>
        <div class="input-group">
          <label>Valor (R$)</label>
          <input type="number" id="qVal" placeholder="0,00">
        </div>
      </div>
      <div class="summary-grid" style="grid-template-columns: 1fr 1fr; gap:8px;">
        <div class="input-group">
          <label>Categoria</label>
          <select id="qCat">
            <option>Essencial</option><option>Lazer</option><option>Saúde</option>
            <option>Educação</option><option>Trabalho</option><option>Outros</option>
          </select>
        </div>
        <div class="input-group">
          <label>Data</label>
          <input type="date" id="qDate">
        </div>
      </div>
      <button class="btn-add" onclick="addEntry()">SALVAR LANÇAMENTO</button>
    </div>
    <div id="quickList"></div>
  </div>

  <div id="tab-detail" class="tab-content hidden">
    <div id="detailList"></div>
  </div>

  <div id="tab-invest" class="tab-content hidden">
    <div class="form-card">
      <div class="input-group"><label>Ativo</label><input type="text" id="iName" placeholder="Ex: PETR4"></div>
      <div class="summary-grid">
        <div class="input-group"><label>Quant.</label><input type="number" id="iQty"></div>
        <div class="input-group"><label>Preço Médio</label><input type="number" id="iPrice"></div>
      </div>
      <button class="btn-add" style="background:var(--blue);color:#fff" onclick="addInvest()">ADICIONAR ATIVO</button>
    </div>
    <div id="investList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── LÓGICA PRINCIPAL (SEM LOGIN) ── */
window.data = { items:[], invest:[] };
window.userCode = "MEU_FINANCEIRO_PADRAO"; // Identificador único automático
let viewY = new Date().getFullYear();
let viewM = new Date().getMonth();

const fmt = v => (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDay = d => {
  const date = new Date(d + 'T12:00:00');
  return date.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
};

function saveData(){
  if(window.saveToFirebase) window.saveToFirebase(window.data);
}

function addEntry(){
  const desc = document.getElementById('qDesc').value.trim();
  const val = parseFloat(document.getElementById('qVal').value);
  const cat = document.getElementById('qCat').value;
  const date = document.getElementById('qDate').value;
  if(!desc || isNaN(val) || !date) return;
  window.data.items.push({ id:Date.now(), date, desc, val, cat });
  saveData();
  document.getElementById('qDesc').value=''; document.getElementById('qVal').value='';
  renderAll();
  toast('Salvo com sucesso!');
}

function deleteItem(id){
  window.data.items = window.data.items.filter(i => i.id !== id);
  saveData();
  renderAll();
}

function changeMonth(dir){
  viewM += dir;
  if(viewM>11){ viewM=0; viewY++; }
  if(viewM<0){ viewM=11; viewY--; }
  renderAll();
}

function goTab(t, el){
  document.querySelectorAll('.tab-content').forEach(d=>d.classList.add('hidden'));
  document.getElementById('tab-'+t).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
}

function renderSummary(){
  const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  document.getElementById('curMonth').textContent = `${months[viewM]} ${viewY}`;
  const filtered = (window.data.items || []).filter(i => {
    const d = new Date(i.date + 'T12:00:00');
    return d.getFullYear() === viewY && d.getMonth() === viewM;
  });
  const inc = filtered.filter(i=>i.val > 0).reduce((a,b)=>a+b.val,0);
  const out = filtered.filter(i=>i.val < 0).reduce((a,b)=>a+b.val,0);
  document.getElementById('sumIn').textContent = 'R$ '+fmt(inc);
  document.getElementById('sumOut').textContent = 'R$ '+fmt(Math.abs(out));
  document.getElementById('sumTotal').textContent = 'R$ '+fmt(inc+out);
}

function renderQuick(){
  const list = document.getElementById('quickList');
  list.innerHTML = '';
  const filtered = (window.data.items || []).filter(i => {
    const d = new Date(i.date + 'T12:00:00');
    return d.getFullYear() === viewY && d.getMonth() === viewM;
  }).sort((a,b)=> new Date(b.date) - new Date(a.date));

  filtered.forEach(i => {
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:700;">${i.desc}</div>
          <div style="font-size:0.7rem; color:var(--text3);">${fmtDay(i.date)} • ${i.cat}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <span class="${i.val>0?'val-in':'val-out'}" style="font-weight:800; font-family:'DM Mono'">${i.val>0?'+':''}${fmt(i.val)}</span>
          <button onclick="deleteItem(${i.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;">✕</button>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

function renderAll(){ renderSummary(); renderQuick(); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

window.onload = () => {
  document.getElementById('qDate').valueAsDate = new Date();
  renderAll();
};
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCbu-o_m4HEV8EQRL4t2bQyC8-EzTJhhDs",
    authDomain: "financeiro-otavio-bf717.firebaseapp.com",
    databaseURL: "https://financeiro-otavio-bf717-default-rtdb.firebaseio.com",
    projectId: "financeiro-otavio-bf717",
    storageBucket: "financeiro-otavio-bf717.appspot.com",
    messagingSenderId: "445036029492",
    appId: "1:445036029492:web:8437cd2ac0c714d0498c61",
    measurementId: "G-LQ38GVHK34"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.saveToFirebase = (dados) => {
    set(ref(db, 'users/' + window.userCode), dados);
  };

  onValue(ref(db, 'users/' + window.userCode), (snapshot) => {
    const cloudData = snapshot.val();
    if (cloudData) {
      window.data.items = cloudData.items ? Object.values(cloudData.items) : [];
      window.data.invest = cloudData.invest ? Object.values(cloudData.invest) : [];
      renderAll();
    }
  });
</script>
</body>
</html>
